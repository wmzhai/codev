interface:
  display_name: "codev-checkpoint"
  short_description: "轻量提交并推送当前分支"
  default_prompt: "使用 $codev-checkpoint 走轻量 codev-checkpoint commit/push 流程；触发后立即用中文与用户交流，整个过程中的状态说明和结果摘要默认都用中文；如果仓库同时使用 gstack，则把它视为不接管 PR、review gate 或 repo 级文档同步的 fallback。"

policy:
  allow_implicit_invocation: false
