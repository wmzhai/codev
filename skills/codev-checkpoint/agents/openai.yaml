interface:
  display_name: "codev-checkpoint"
  short_description: "用户触发即表示人工验证已完成；执行任务收口、`CHANGELOG` 未发布更新、主干提交与 issue 处理。"
  default_prompt: "使用 $codev-checkpoint 执行收口第一阶段。触发后立即用中文交流。用户触发即表示 `codev-taskdev` 收尾编译责任和人工验证已经完成；无 task 模式也依赖用户已外部确认。完成任务定位与归档、相关 `docs`/`memory`（必要时 `AGENTS.md`）更新、`CHANGELOG` 未发布区同步，并产出收口 `commit` 后主干提交 + push，以及 issue 的 comment/close；不运行 build/test/lint/typecheck 或脚本验证。明确不执行版本 bump 与 tag；若 `CHANGELOG`/`gh` 阻塞，立即返回。"

policy:
  allow_implicit_invocation: false
