interface:
  display_name: "gstack2task"
  short_description: "把 ~/.gstack/projects/ 下的 gstack 工件收敛成可执行任务文件"
  default_prompt: "使用 $gstack2task 读取 ~/.gstack/projects/ 下与当前仓库相关的 gstack design doc、implementation handoff 或 test plan，并按 tasks/ 与 tasks/done/ 中现有最大任务号顺延生成任务；如果拆成多个 task，则使用连续整数任务号，并为每个 task 分别新建与该 task 文件同名的新分支，再在各自分支写入文件。"
