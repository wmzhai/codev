interface:
  display_name: "codev-issue2task"
  short_description: "把一个或多个 issue/需求描述结合代码收敛成带实现计划的任务文件"
  default_prompt: "使用 $codev-issue2task 分析当前仓库的 GitHub issues，或直接根据用户附带的需求描述生成任务；触发后立即用中文与用户交流，整个过程中的需求判断、阻塞说明和结果汇报默认都用中文；无参数时默认选择当前仓库编号最小的 open issue；如果参数是 `optworks#70` 这样的 `子目录#编号` 形式，把 `optworks` 解析为当前目录下的子目录，并把目标仓库切换到该子仓库后读取 GitHub issue #70，后续代码阅读、任务查重和 task 写入都在目标仓库内完成；如果参数里显式给出多个 issue 编号，支持逗号或空格分隔，默认把这组 issue 合并成一个总体 task，适合多个 issue 合并出一个版本；多个带子目录前缀的 issue 引用必须指向同一个子目录；先结合现有代码按固定提纲把问题复述、当前代码现状、关键判断、待确认清单和推荐方案和用户讨论清楚，只有在用户明确确认后才写入带 `Related Code`、`Implementation Plan` 和 `Validation Plan` 的 tasks/Txx-*.md；如果拆成多个 task，则使用连续整数任务号；默认不新建分支、不切分支，除非用户明确要求。"
