interface:
  display_name: "codev-quickship"
  short_description: "在人工验证通过后完成 task 收尾：归档任务、同步 docs/memory/AGENTS 和已有版本工件，并提交合并推送到主干"
  default_prompt: "使用 $codev-quickship 在人工验证通过后收尾当前任务：触发后立即用中文与用户交流，默认以当前 git 分支为工作起点、`main/master` 或仓库默认主干为目标；把用户显式调用 `$codev-quickship` 本身视为已经确认“功能经过人工验证，且允许直接收尾与 push 主干”，不要重复追问同义确认问题；随后定位对应 task 文件，同步最终 task 文档、更新已确认通过的验收项、归档到 `tasks/done/`，并按最小必要范围更新任务相关 `docs/`、`memory/` 与必要时的 `AGENTS.md`；如果仓库里已经存在版本号文件或 `CHANGELOG`，按仓库既有方式做最小同步，不存在就明确跳过且不新建；如果当前在分支上，就先提交这些收尾改动，再把分支合并到主干并推送；如果已经在主干，就直接做最小提交并推送；只有当用户在同轮明确表示“尚未人工验证”或“不要 push 主干”时，才停止；不要调用 $ship、$land-and-deploy、$document-release，不要创建 PR，不要打 tag，也不要进入正式发布流程。"
