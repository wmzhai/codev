interface:
  display_name: "codev-checkpoint"
  short_description: "收口第一阶段：任务收口、验收同步、`CHANGELOG` 未发布更新、最小校验、主干提交与 issue 处理。"
  default_prompt: "使用 $codev-checkpoint 执行收口第一阶段。触发后立即用中文交流。完成任务定位与归档、相关 `docs`/`memory`（必要时 `AGENTS.md`）更新、`CHANGELOG` 未发布区同步、最小校验，并产出收口 `commit` 后主干提交 + push，以及 issue 的 comment/close。明确不执行版本 bump 与 tag；若 `CHANGELOG`/`gh` 阻塞，立即返回。"

policy:
  allow_implicit_invocation: false
