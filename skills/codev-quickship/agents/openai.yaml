interface:
  display_name: "codev-quickship"
  short_description: "在人工验证通过后完成统一收尾：优先按 task 归档，同步 VERSION/CHANGELOG；无 task 时也可收尾，并在 CHANGELOG 记录改动摘要"
  default_prompt: "使用 $codev-quickship 在人工验证通过后收尾当前任务：触发后立即用中文与用户交流，默认以当前 git 分支为工作起点、以仓库默认主干为目标；把用户显式调用 `$codev-quickship` 本身视为已经确认“功能经过人工验证，且允许直接收尾与 push 主干”，不要重复追问同义确认问题；随后优先定位对应 task 文件，并从标题下方的 `Issue:` / `Issues:` 行或历史 `## Source Issues` 段解析 GitHub issue 映射；如果找到了 task，就同步最终 task 文档、更新已确认通过的验收项、归档到 `tasks/done/`，并按最小必要范围更新任务相关 `docs/`、`memory/` 与必要时的 `AGENTS.md`；如果仓库里没有可定位 task，则进入无 task 收尾模式，跳过 task 归档与 issue 关闭，但仍要在 `CHANGELOG` 中补一条本轮相关改动摘要，并继续做最小必要的 repo 文档同步；根目录 `VERSION` 已初始化且必须是单个可稳定解析的版本号，兼容 3 位或历史 4 位纯数字格式；如果用户未显式指定版本，则默认按 3 位版本号做 `z+1`；如果当前 `VERSION` 仍是历史 4 位格式 `x.y.z.w`，则下一次直接写成 `x.y.(z+1)`，例如 `1.2.3.4 -> 1.2.4`；如果用户显式指定目标版本，则按指定值写入，但该版本必须是 3 位纯数字；随后同步已有 `CHANGELOG`；如果当前在分支上，就先提交这些收尾改动，再把分支合并到主干并推送；提交信息要采用 `type: 具体工作摘要 (vX.Y.Z)` 形式，工作摘要先写清具体工作，版本号放在最后括号里；如果已经在主干，就直接做最小提交并推送，并同样遵守上述 commit message 规则；如果 task 明确映射到 GitHub issue，则仅在主干 push 成功后先逐个执行 `gh issue comment <number>` 追加本轮工作摘要，再逐个执行 `gh issue close <number>` 关闭对应 issue；只有当用户在同轮明确表示“尚未人工验证”或“不要 push 主干”时，才停止；不要调用 $ship、$land-and-deploy、$document-release，不要创建 PR，不要打 tag，也不要进入正式发布流程。"
