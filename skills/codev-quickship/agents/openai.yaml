interface:
  display_name: "codev-quickship"
  short_description: "先执行 checkpoint 第一阶段，再做版本 bump 与 tag 的第二阶段。"
  default_prompt: "使用 $codev-quickship 收口。触发后立即用中文交流。先执行 `codev-checkpoint` 的第一阶段（任务/CHANGELOG/最小校验/主干提交/issue 处理）；第一阶段成功后自动进入版本阶段，无需额外确认。按仓库规则或显式参数确定目标版本，更新 `VERSION` 与版本工件、整理 `CHANGELOG` 版本日志、生成 `type: 具体工作摘要 (v<VERSION>)` 提交，创建并推送 tag（默认 `v<VERSION>`）。若任一阶段失败或阻塞条件命中，立即阻塞并汇报。"
policy:
  allow_implicit_invocation: false
